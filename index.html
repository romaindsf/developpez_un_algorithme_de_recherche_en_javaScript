<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Les Petits Plats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              anton: ['Anton', 'sans-serif'],
              manrope: ['Manrope', 'sans-serif'],
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-[#EDEDED] font-manrope min-h-screen">

    <header class="bg-[#1B1B1B] py-16 text-center">
      <h1 class="font-anton text-[#FFD15B] text-5xl uppercase leading-tight">
        Cherchez parmi plus de 1500 recettes<br />
        du quotidien, simples et délicieuses
      </h1>
      <div class="mt-8 max-w-2xl mx-auto px-4">
        <div class="flex items-center bg-white rounded-lg overflow-hidden">
          <input
            id="search-main"
            type="search"
            placeholder="Rechercher une recette, un ingrédient, ..."
            class="flex-1 px-6 py-4 text-sm outline-none bg-transparent"
            autocomplete="off"
          />
          <button type="button" class="bg-[#1B1B1B] p-4 m-1 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">

      <div class="flex items-center gap-4 mb-4">

        <div id="dropdown-ingredients" class="relative">
          <button type="button" class="dropdown-toggle flex items-center justify-between gap-10 bg-white px-5 py-3 rounded-xl text-sm min-w-[160px]">
            <span>Ingrédients</span>
            <svg class="chevron w-4 h-4 transition-transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="dropdown-panel hidden absolute top-full left-0 mt-1 bg-white rounded-xl shadow-lg z-20 w-56">
            <div class="p-3">
              <input type="text" class="dropdown-search w-full border rounded-lg px-3 py-2 text-sm outline-none" placeholder="" />
            </div>
            <ul class="dropdown-list max-h-52 overflow-y-auto px-2 pb-2 text-sm"></ul>
          </div>
        </div>

        <div id="dropdown-appareils" class="relative">
          <button type="button" class="dropdown-toggle flex items-center justify-between gap-10 bg-white px-5 py-3 rounded-xl text-sm min-w-[160px]">
            <span>Appareils</span>
            <svg class="chevron w-4 h-4 transition-transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="dropdown-panel hidden absolute top-full left-0 mt-1 bg-white rounded-xl shadow-lg z-20 w-56">
            <div class="p-3">
              <input type="text" class="dropdown-search w-full border rounded-lg px-3 py-2 text-sm outline-none" placeholder="" />
            </div>
            <ul class="dropdown-list max-h-52 overflow-y-auto px-2 pb-2 text-sm"></ul>
          </div>
        </div>

        <div id="dropdown-ustensiles" class="relative">
          <button type="button" class="dropdown-toggle flex items-center justify-between gap-10 bg-white px-5 py-3 rounded-xl text-sm min-w-[160px]">
            <span>Ustensiles</span>
            <svg class="chevron w-4 h-4 transition-transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div class="dropdown-panel hidden absolute top-full left-0 mt-1 bg-white rounded-xl shadow-lg z-20 w-56">
            <div class="p-3">
              <input type="text" class="dropdown-search w-full border rounded-lg px-3 py-2 text-sm outline-none" placeholder="" />
            </div>
            <ul class="dropdown-list max-h-52 overflow-y-auto px-2 pb-2 text-sm"></ul>
          </div>
        </div>

        <span id="recipes-count" class="ml-auto font-anton font-bold text-[#1B1B1B]">50 recettes</span>
      </div>

      <div id="active-tags" class="flex flex-wrap gap-2 mb-6"></div>

      <div id="recipes-grid" class="grid grid-cols-3 gap-6"></div>

    </main>

    <script src="recipes/recipes.js"></script>
    <script src="js/state.js"></script>
    <script src="js/search.js"></script>
    <script src="js/cards.js"></script>
    <script src="js/dropdowns.js"></script>
    <script src="js/tags.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
